spring:
  datasource:
    # Production can override these with SPRING_DATASOURCE_* to use PostgreSQL.
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:securedb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  port: ${PORT:8443}
  forward-headers-strategy: framework
  ssl:
    enabled: ${SERVER_SSL_ENABLED:true}
    protocol: TLS
    enabled-protocols: TLSv1.3
    key-store: classpath:certs/server.p12
    key-store-type: PKCS12
    key-store-password: server-secret
    key-alias: server
    key-password: server-secret
    trust-store: classpath:certs/server-truststore.p12
    trust-store-type: PKCS12
    trust-store-password: truststore-secret
    client-auth: ${SERVER_SSL_CLIENT_AUTH:need}

secure:
  client-identity:
    mode: ${SECURE_CLIENT_IDENTITY_MODE:mtls}
    header-name: ${SECURE_CLIENT_IDENTITY_HEADER:X-Device-Id}

logging:
  level:
    com.example.securechannel: DEBUG

